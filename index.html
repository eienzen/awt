                            <li><strong>Withdraw:</strong> Unstake your AWT.</li>
                        </ul>
                        <button onClick={() => setActiveSection('dashboard')} className="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Back to Dashboard</button>
                    </div>
                ),
                museum: (
                    <div className="p-6">
                        <h2 className="text-2xl font-bold text-gold-500 mb-4">Token Museum</h2>
                        <p className="mb-2">AWT Token: The currency of Atheist World, symbolizing freedom and reason.</p>
                        <p>Total Supply: 1,000,000 AWT</p>
                        <p>Distribution: 50% Staking, 30% Team, 20% Marketing</p>
                        <div className="mt-4 w-full h-64 bg-gray-700 rounded">
                            {/* Placeholder for chart */}
                            <p className="text-center pt-24 text-white">Chart Coming Soon</p>
                        </div>
                        <button onClick={() => setActiveSection('dashboard')} className="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Back to Dashboard</button>
                    </div>
                )
            };

            return (
                <div className="min-h-screen bg-gray-900 text-white font-poppins">
                    <header className="bg-gradient-to-r from-blue-500 to-teal-400 p-4 text-center">
                        <h1 className="text-4xl font-bold">Atheist World AWT</h1>
                        <p class="text-lg">Embrace Reason, Explore the Ethereal</p>
                    </header>
                    <div className="flex">
                        <nav className="w-64 bg-gray-800 p-4 h-screen">
                            <h3 className="text-xl font-semibold mb-4">Menu</h3>
                            <ul>
                                <li><button onClick={() => setActiveSection('dashboard')} className="w-full text-left p-2 hover:bg-gray-700 rounded">Dashboard</button></li>
                                <li><button onClick={() => setActiveSection('guide')} className="w-full text-left p-2 hover:bg-gray-700 rounded">User Guide</button></li>
                                <li><button onClick={() => setActiveSection('museum')} className="w-full text-left p-2 hover:bg-gray-700 rounded">Token Museum</button></li>
                            </ul>
                            {!account && <button onClick={connectWallet} className="mt-4 w-full bg-gold-500 text-white px-4 py-2 rounded">Connect Wallet</button>}
                        </nav>
                        <main className="flex-1 p-6">
                            {account ? sections[activeSection] : <div className="text-center mt-20"><button onClick={connectWallet} className="bg-gold-500 text-white px-6 py-3 rounded-lg text-xl">Connect Wallet to Start</button></div>}
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
